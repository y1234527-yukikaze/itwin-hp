<!DOCTYPE html>
<!--
  ============================================================
  アイツイン｜送信完了ページ
  ------------------------------------------------------------
  ・お問い合わせフォーム（Formspree）送信後の遷移先。
    各フォームの <input type="hidden" name="_next" value="https://i-twin.co.jp/thanks.html"> から遷移します。
  ・依存を避けるため style.css / style-v2.css には依存しない自己完結ページです。
  ・本文はこのHTML内のテキストを直接書き換えてください。
  ============================================================
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了｜アイツイン（i-TWIN）</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png">
  <style>
    :root{
      --navy:#0d2b4e;
      --orange:#d4691a;
      --ink:#1c2733;
      --ink-soft:#4a5663;
      --line:#e2e8f0;
      --paper-soft:#f5f7fa;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      color:var(--ink);
      background:var(--paper-soft);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      line-height:1.8;
    }
    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 12px 40px rgba(13,43,78,0.08);
      max-width:520px;
      width:100%;
      padding:48px 36px 40px;
      text-align:center;
    }
    .logo{height:40px;width:auto;margin-bottom:28px;}
    .icon{
      width:64px;height:64px;border-radius:50%;
      background:var(--navy);color:#fff;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 22px;font-size:30px;
    }
    h1{
      font-family:"Shippori Mincho",serif;
      font-weight:700;
      color:var(--navy);
      font-size:1.5rem;
      margin:0 0 14px;
    }
    p{color:var(--ink-soft);font-size:0.98rem;margin:0 0 8px;}
    .note{font-size:0.86rem;color:var(--ink-soft);margin-top:22px;}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      margin-top:28px;padding:13px 30px;
      background:var(--orange);color:#fff;
      border-radius:999px;font-weight:700;font-size:0.95rem;
      text-decoration:none;
    }
    .btn:hover{background:#b4530f;}
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="itwin-logo.png" alt="アイツイン">
    <div class="icon" aria-hidden="true">✓</div>
    <h1>お問い合わせを受け付けました</h1>
    <p>送信ありがとうございました。内容を確認のうえ、担当より折り返しご連絡いたします。</p>
    <p>今しばらくお待ちくださいますよう、お願いいたします。</p>
    <a class="btn" href="index.html">ホームに戻る</a>
    <p class="note">受付：平日 9:00–18:00　／　アイツイン（i-TWIN）</p>
  </div>
</body>
</html>
